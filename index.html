<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verben – Konjugation</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇩🇪</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13; --surface: #1a1a22; --border: #2e2e3a;
    --accent: #7c6af7; --text: #e8e8f0; --muted: #888899; --wrong: #f26b6b;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
  .container { width: 100%; max-width: 600px; }
  .header { text-align: center; margin-bottom: 2rem; }
  .verb { font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 600; letter-spacing: -1px; background: linear-gradient(135deg, var(--accent), #b09af7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .subtitle { color: var(--muted); font-size: 0.85rem; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; margin-top: 0.5rem; }
  .group-label { font-size: 0.7rem; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); text-align: center; margin-bottom: 0.5rem; }
  .selector { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; margin-bottom: 0.75rem; }
  .selector-group { margin-bottom: 1.5rem; }
  .pill { padding: 0.45rem 1rem; border-radius: 999px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-family: 'Inter', sans-serif; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
  .pill:hover { border-color: var(--accent); color: var(--text); }
  .pill.active { background: var(--accent); border-color: var(--accent); color: white; }
  .search-group { margin-bottom: 2rem; }
  .search-wrap { display: flex; gap: 0.5rem; align-items: center; }
  .search-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.7rem 1rem; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.95rem; outline: none; caret-color: var(--accent); transition: border-color 0.2s; }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: #3a3a4a; }
  .search-btn { padding: 0.7rem 1.2rem; border-radius: 10px; border: none; background: var(--accent); color: white; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: opacity 0.2s; white-space: nowrap; }
  .search-btn:hover { opacity: 0.85; }
  .search-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .search-status { margin-top: 0.5rem; font-size: 0.8rem; color: var(--muted); text-align: center; min-height: 1.2rem; }
  .search-status.error { color: var(--wrong); }
  .section { margin-bottom: 2.5rem; }
  .section-label { font-size: 0.75rem; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; padding-left: 0.25rem; }
  .rows { display: flex; flex-direction: column; gap: 0.6rem; }
  .row { display: grid; grid-template-columns: 80px 1fr; align-items: center; gap: 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1rem; }
  .pronoun { color: var(--muted); font-size: 0.9rem; }
  .form { color: var(--text); font-size: 1rem; }
  .form.loading { color: #3a3a4a; font-style: italic; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="verb" id="verbTitle">sein</div>
    <div class="subtitle">Konjugation</div>
  </div>
  <div class="selector-group">
    <div class="group-label">Hilfsverben</div>
    <div class="selector" id="selector-hilfs"></div>
  </div>
  <div class="selector-group">
    <div class="group-label">Modalverben</div>
    <div class="selector" id="selector-modal"></div>
  </div>
  <div class="search-group">
    <div class="group-label">Beliebiges Verb nachschlagen</div>
    <div class="search-wrap">
      <input class="search-input" id="searchInput" type="text" placeholder="z.B. machen, gehen, essen ..." autocomplete="off" spellcheck="false">
      <button class="search-btn" id="searchBtn" onclick="searchVerb()">Suchen</button>
    </div>
    <div class="search-status" id="searchStatus"></div>
  </div>
  <div class="section">
    <div class="section-label">Präsens</div>
    <div class="rows" id="prasens"></div>
  </div>
  <hr class="divider">
  <div class="section">
    <div class="section-label">Perfekt</div>
    <div class="rows" id="perfekt"></div>
  </div>
  <hr class="divider">
  <div class="section">
    <div class="section-label">Präteritum</div>
    <div class="rows" id="prateritum"></div>
  </div>
  <hr class="divider">
  <div class="section">
    <div class="section-label">Konjunktiv II</div>
    <div class="rows" id="konjunktiv"></div>
  </div>
</div>

<script>
  const pronouns = ['ich', 'du', 'er/sie/es', 'wir', 'ihr', 'sie/Sie'];

  const hilfsVerben = {
    sein:   { prasens: ['bin','bist','ist','sind','seid','sind'], prateritum: ['war','warst','war','waren','wart','waren'], konjunktiv: ['wäre','wärst','wäre','wären','wäret','wären'], perfekt: {partizip: 'gewesen', hilfsverb: 'sein'} },
    haben:  { prasens: ['habe','hast','hat','haben','habt','haben'], prateritum: ['hatte','hattest','hatte','hatten','hattet','hatten'], konjunktiv: ['hätte','hättest','hätte','hätten','hättet','hätten'], perfekt: {partizip: 'gehabt', hilfsverb: 'haben'} },
    werden: { prasens: ['werde','wirst','wird','werden','werdet','werden'], prateritum: ['wurde','wurdest','wurde','wurden','wurdet','wurden'], konjunktiv: ['würde','würdest','würde','würden','würdet','würden'], perfekt: {partizip: 'geworden', hilfsverb: 'sein'} }
  };

  const modalVerben = {
    können: { prasens: ['kann','kannst','kann','können','könnt','können'], prateritum: ['konnte','konntest','konnte','konnten','konntet','konnten'], konjunktiv: ['könnte','könntest','könnte','könnten','könntet','könnten'], perfekt: {partizip: 'gekonnt', hilfsverb: 'haben'} },
    dürfen: { prasens: ['darf','darfst','darf','dürfen','dürft','dürfen'], prateritum: ['durfte','durftest','durfte','durften','durftet','durften'], konjunktiv: ['dürfte','dürftest','dürfte','dürften','dürftet','dürften'], perfekt: {partizip: 'gedurft', hilfsverb: 'haben'} },
    müssen: { prasens: ['muss','musst','muss','müssen','müsst','müssen'], prateritum: ['musste','musstest','musste','mussten','musstet','mussten'], konjunktiv: ['müsste','müsstest','müsste','müssten','müsstet','müssten'], perfekt: {partizip: 'gemusst', hilfsverb: 'haben'} },
    sollen: { prasens: ['soll','sollst','soll','sollen','sollt','sollen'], prateritum: ['sollte','solltest','sollte','sollten','solltet','sollten'], konjunktiv: ['sollte','solltest','sollte','sollten','solltet','sollten'], perfekt: {partizip: 'gesollt', hilfsverb: 'haben'} },
    wollen: { prasens: ['will','willst','will','wollen','wollt','wollen'], prateritum: ['wollte','wolltest','wollte','wollten','wolltet','wollten'], konjunktiv: ['wollte','wolltest','wollte','wollten','wolltet','wollten'], perfekt: {partizip: 'gewollt', hilfsverb: 'haben'} },
    mögen:  { prasens: ['mag','magst','mag','mögen','mögt','mögen'], prateritum: ['mochte','mochtest','mochte','mochten','mochtet','mochten'], konjunktiv: ['möchte','möchtest','möchte','möchten','möchtet','möchten'], perfekt: {partizip: 'gemocht', hilfsverb: 'haben'} }
  };

  const allVerbs = { ...hilfsVerben, ...modalVerben };
  let current = 'sein';

  function buildSelector(containerId, verbs) {
    const sel = document.getElementById(containerId);
    Object.keys(verbs).forEach(v => {
      const pill = document.createElement('button');
      pill.className = 'pill' + (v === current ? ' active' : '');
      pill.textContent = v;
      pill.id = 'pill-' + v;
      pill.onclick = () => selectVerb(v);
      sel.appendChild(pill);
    });
  }

  function selectVerb(v) {
    current = v;
    document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.id === 'pill-' + v));
    document.getElementById('verbTitle').textContent = v;
    document.getElementById('searchStatus').textContent = '';
    document.getElementById('searchStatus').className = 'search-status';
    document.getElementById('searchInput').value = '';
    buildRows(allVerbs[v].prasens, allVerbs[v].konjunktiv, false, allVerbs[v].prateritum || null);
    buildPerfekt(allVerbs[v].perfekt || null);
  }

  function buildRows(prasens, konjunktiv, loading = false, prateritum = null) {
    const data = { prasens, konjunktiv, prateritum: prateritum || ['—','—','—','—','—','—'] };
    ['prasens', 'konjunktiv', 'prateritum'].forEach(tense => {
      const container = document.getElementById(tense);
      if (!container) return;
      container.innerHTML = '';
      const forms = data[tense];
      pronouns.forEach((pron, i) => {
        const row = document.createElement('div');
        row.className = 'row';
        const formText = loading ? '...' : (forms[i] || '—');
        row.innerHTML = `<span class="pronoun">${pron}</span><span class="form${loading ? ' loading' : ''}">${formText}</span>`;
        container.appendChild(row);
      });
    });
  }

  function buildPerfekt(perfekt) {
    const container = document.getElementById('perfekt');
    if (!container) return;
    container.innerHTML = '';
    const items = [
      { label: 'Partizip II', value: perfekt ? perfekt.partizip : '—' },
      { label: 'Hilfsverb',  value: perfekt ? perfekt.hilfsverb : '—' }
    ];
    items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = `<span class="pronoun">${item.label}</span><span class="form">${item.value}</span>`;
      container.appendChild(row);
    });
  }

  // Derive ihr Präsens from infinitive and er form
  function deriveIhr(infinitive, erForm) {
    const hasSep = erForm.includes(' ');
    if (hasSep) {
      // Separable verb: prefix stays → check if er stem matches inf stem
      const parts = erForm.split(' ');
      const erStem = parts[0].slice(0, -1); // remove -t from e.g. "kauft"
      const prefix = parts[1];
      const infStem = infinitive.replace(prefix, '').replace(/en$|n$/, '');
      if (erStem.toLowerCase() === infStem.toLowerCase()) return erForm;
      return infStem + 't ' + prefix;
    }
    const erStem = erForm.slice(0, -1); // remove trailing -t
    const infStem = infinitive.replace(/en$|n$/, '');
    if (erStem.toLowerCase() === infStem.toLowerCase()) return erForm;
    // Vowel change detected — use infinitive stem
    if (infStem.match(/[td]$/)) return infStem + 'et';
    return infStem + 't';
  }

  // Derive all 6 Konjunktiv II forms from ich form
  function deriveKonjunktiv2(ichForm) {
    if (!ichForm || ichForm === '—') return ['—','—','—','—','—','—'];
    const hasSep = ichForm.includes(' ');
    const base = hasSep ? ichForm.split(' ')[0] : ichForm;
    const suf  = hasSep ? ' ' + ichForm.split(' ')[1] : '';
    return [base+suf, base+'st'+suf, base+suf, base+'n'+suf, base+'t'+suf, base+'n'+suf];
  }

  // Derive all 6 Präteritum forms from ich form
  function derivePrateritum(ichForm) {
    if (!ichForm || ichForm === '—') return ['—','—','—','—','—','—'];
    const hasSep = ichForm.includes(' ');
    const stem = hasSep ? ichForm.split(' ')[0] : ichForm;
    const suf  = hasSep ? ' ' + ichForm.split(' ')[1] : '';
    const isWeak = stem.endsWith('te');
    if (isWeak) {
      return [stem+suf, stem+'st'+suf, stem+suf, stem+'n'+suf, stem+'t'+suf, stem+'n'+suf];
    }
    const duSuffix = /[sßzx]$/.test(stem) ? 'est' : 'st';
    return [stem+suf, stem+duSuffix+suf, stem+suf, stem+'en'+suf, stem+'t'+suf, stem+'en'+suf];
  }

  function cleanCell(el) {
    if (!el) return null;
    return el.textContent.replace(/\[.*?\]/g, '').trim() || null;
  }

  async function searchVerb() {
    const input = document.getElementById('searchInput');
    const verb = input.value.trim().toLowerCase();
    if (!verb) return;

    const status = document.getElementById('searchStatus');
    const btn = document.getElementById('searchBtn');

    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    document.getElementById('verbTitle').textContent = verb;
    status.className = 'search-status';
    status.textContent = 'Wird gesucht ...';
    btn.disabled = true;
    buildRows([], [], true);

    try {
      // Fetch wikitext — compact template has ich/du/er + Konjunktiv II ich
      const wurl = `https://de.wiktionary.org/w/api.php?action=parse&page=${encodeURIComponent(verb)}&prop=wikitext&format=json&origin=*`;
      const wres = await fetch(wurl);
      const wdata = await wres.json();

      if (wdata.error || !wdata.parse) {
        status.className = 'search-status error';
        status.textContent = `„${verb}" nicht gefunden.`;
        buildRows(['—','—','—','—','—','—'], ['—','—','—','—','—','—']);
        return;
      }

      const wikitext = wdata.parse.wikitext['*'];

      // Parse all template params from wikitext
      const params = {};
      for (const m of wikitext.matchAll(/\|([^=|\n{]+)=([^|\n}]*)/g)) {
        const val = m[2].trim().replace(/\[\[([^\]|]+)(?:\|[^\]]*)?\]\]/g, '$1').replace(/<[^>]+>/g, '').trim();
        if (val) params[m[1].trim()] = val;
      }

      const g = (...keys) => { for (const k of keys) if (params[k]) return params[k]; return null; };

      // Präsens — wikitext is reliable for these
      const pIch = g('Präsens_ich') || '—';
      const pDu  = g('Präsens_du') || '—';
      const pEr  = g('Präsens_er, sie, es', 'Präsens_er,sie,es', 'Präsens_er/sie/es') || '—';
      // For separable verbs (pIch = "kaufe ein"), wir/sie = "kaufen ein" not "einkaufen"
      const sepPrefix = pIch.includes(' ') ? pIch.split(' ').slice(1).join(' ') : null;
      const wirBase   = sepPrefix ? verb.replace(new RegExp('^' + sepPrefix), '') : verb;
      const wirForm   = sepPrefix ? wirBase + ' ' + sepPrefix : verb;
      const pWir = g('Präsens_wir') || wirForm;
      const pSie = g('Präsens_sie', 'Präsens_sie, Sie') || wirForm;
      const pIhr = g('Präsens_ihr') || deriveIhr(verb, pEr);

      // Konjunktiv II ich — try wikitext first, then HTML table, then Präteritum fallback
      let k2Ich = g('Konjunktiv_II_ich', 'Konjunktiv II_ich');

      if (!k2Ich) {
        // Parse rendered HTML table — look for row containing "Konjunktiv II"
        try {
          const hurl = `https://de.wiktionary.org/w/api.php?action=parse&page=${encodeURIComponent(verb)}&prop=text&format=json&origin=*`;
          const hres = await fetch(hurl);
          const hdata = await hres.json();
          if (hdata.parse) {
            const doc2 = new DOMParser().parseFromString(hdata.parse.text['*'], 'text/html');
            for (const row of doc2.querySelectorAll('tr')) {
              const cells = [...row.querySelectorAll('td')];
              if (cells.some(c => c.textContent.trim() === 'Konjunktiv II')) {
                const form = cells[cells.length - 1].textContent.replace(/\[.*?\]/g, '').replace(/!/g, '').trim();
                if (form && form !== 'Konjunktiv II') { k2Ich = form; break; }
              }
            }
          }
        } catch(e) {}
      }

      // Last resort: use Präteritum ich (correct for weak verbs where KII = Präteritum)
      if (!k2Ich) k2Ich = g('Präteritum_ich');

      const konjunktiv = k2Ich ? deriveKonjunktiv2(k2Ich) : ['—','—','—','—','—','—'];

      // Präteritum ich — same strategy as Konjunktiv II
      let praetIch = g('Präteritum_ich');

      if (!praetIch) {
        try {
          const hurl2 = `https://de.wiktionary.org/w/api.php?action=parse&page=${encodeURIComponent(verb)}&prop=text&format=json&origin=*`;
          const hres2 = await fetch(hurl2);
          const hdata2 = await hres2.json();
          if (hdata2.parse) {
            const doc3 = new DOMParser().parseFromString(hdata2.parse.text['*'], 'text/html');
            for (const row of doc3.querySelectorAll('tr')) {
              const cells = [...row.querySelectorAll('td')];
              if (cells.some(c => c.textContent.trim() === 'Präteritum')) {
                const form = cells[cells.length - 1].textContent.replace(/\[.*?\]/g, '').trim();
                if (form && form !== 'Präteritum') { praetIch = form; break; }
              }
            }
          }
        } catch(e) {}
      }

      const prateritum = derivePrateritum(praetIch);

      const partizip   = g('Partizip II', 'Partizip_II') || '—';
      const hilfsverb  = g('Hilfsverb') || '—';
      buildPerfekt({ partizip, hilfsverb });

      buildRows([pIch, pDu, pEr, pWir, pIhr, pSie], konjunktiv, false, prateritum);
      status.className = 'search-status';
      status.textContent = 'Quelle: de.wiktionary.org';

    } catch (e) {
      status.className = 'search-status error';
      status.textContent = 'Fehler beim Laden.';
      buildRows(['—','—','—','—','—','—'], ['—','—','—','—','—','—']);
    } finally {
      btn.disabled = false;
    }
  }

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') searchVerb();
  });

  buildSelector('selector-hilfs', hilfsVerben);
  buildSelector('selector-modal', modalVerben);
  buildRows(allVerbs[current].prasens, allVerbs[current].konjunktiv, false, allVerbs[current].prateritum || null);
  buildPerfekt(allVerbs[current].perfekt || null);
</script>
</body>
</html>
